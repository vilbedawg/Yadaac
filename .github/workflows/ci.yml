name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            install: >- 
              sudo apt-get update && 
              sudo apt-get install -y g++-13 clang-tidy-17

          - os: ubuntu-latest
            compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            install: >-
              sudo apt-get update &&
              sudo apt-get install -y clang-17 clang-tidy-17

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Configure
        run: cmake -B build
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build --target run_tests

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Run clang-tidy
        run: find tests -name '*.cpp' | xargs clang-tidy-17 -p build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-17

      - name: Check formatting
        run: find include tests \( -name '*.hpp' -o -name '*.cpp' \) | xargs clang-format-17 --dry-run --Werror
